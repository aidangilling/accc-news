<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ACCC Media Releases &amp; Updates</title>
    <meta
      name="description"
      content="A mirror of the ACCC news centre — media releases and updates (excluding speeches), in a sortable, filterable table."
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23ef8645'/%3E%3Ctext x='50' y='70' font-size='58' text-anchor='middle' fill='white' font-family='Georgia,serif'%3EN%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <p class="eyebrow">News Centre</p>
        <h1>ACCC Media Releases &amp; Updates</h1>
        <p class="lede">
          A summary table mirroring the ACCC
          <a
            href="https://www.accc.gov.au/news-centre"
            rel="noopener"
            >news centre</a
          >, covering media releases and updates (speeches excluded). Updated
          automatically twice daily.
        </p>
      </div>
    </header>

    <main class="wrap" id="main">
      <div id="staleness" class="banner" hidden></div>
      <div id="error" class="banner banner--error" hidden></div>

      <!-- The section is injected by app.js -->
      <section class="section" id="section-news"></section>

      <p id="loading" class="loading">Loading news data…</p>
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <p>
          Source:
          <a
            href="https://www.accc.gov.au/news-centre"
            rel="noopener"
            >ACCC news centre</a
          >
        </p>
      </div>
    </footer>

    <div class="zoom-control" role="group" aria-label="Table zoom">
      <button type="button" class="zoom-btn" id="zoom-out" aria-label="Zoom out — show more">&minus;</button>
      <span class="zoom-ico" aria-hidden="true">&#128269;</span>
      <span class="zoom-level" id="zoom-level">100%</span>
      <button type="button" class="zoom-btn" id="zoom-in" aria-label="Zoom in">+</button>
    </div>

    <script src="assets/app.js" defer></script>
  </body>
</html>
